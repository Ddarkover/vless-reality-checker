name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write  # обязательно для создания Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download openssl.exe для Windows
        shell: pwsh
        run: |
          # Скачиваем статически слинкованный openssl.exe от FireDaemon (OpenSSL 3.x, без DLL-зависимостей)
          $url = "https://mirror.firedaemon.com/OpenSSL/openssl-3.3.2.zip"
          $zip = "openssl.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath openssl_dist -Force
          # Ищем openssl.exe в распакованных файлах
          $exe = Get-ChildItem -Recurse openssl_dist -Filter "openssl.exe" |
                   Where-Object { $_.FullName -match "x64" } |
                   Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Recurse openssl_dist -Filter "openssl.exe" |
                     Select-Object -First 1
          }
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item $exe.FullName -Destination bin\openssl.exe
          Write-Host "openssl.exe скопирован: $(bin\openssl.exe --version 2>&1)"

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --name checker
          --console
          --collect-all rich
          --collect-all certifi
          --add-binary "bin/openssl.exe;bin"
          checker.py

      - name: Upload artifact (всегда)
        uses: actions/upload-artifact@v4
        with:
          name: checker-windows-exe
          path: dist/checker.exe

      # Определяем имя тега: либо из git-тега, либо из ввода workflow_dispatch
      - name: Определить версию
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Создать GitHub Release и прикрепить EXE
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          files: dist/checker.exe
          body: |
            ## VLESS+Reality Camouflage Site Checker

            ### Установка
            Скачай `checker.exe` и запусти — Python не нужен.

            ### Использование
            ```
            checker.exe                        # интерактивный режим
            checker.exe google.com github.com  # передать домены аргументами
            ```
