name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write  # обязательно для создания Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Подготовить openssl.exe для упаковки
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\OpenSSL-Win64\bin\openssl.exe",
            "C:\Program Files\OpenSSL\bin\openssl.exe",
            "C:\Program Files (x86)\OpenSSL-Win32\bin\openssl.exe"
          )
          $found = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $found = $c; break }
          }
          if (-not $found) {
            $found = (where.exe openssl 2>$null) | Select-Object -First 1
          }
          if (-not $found) {
            Write-Error "openssl.exe не найден!"
            exit 1
          }
          Write-Host "Найден: $found"
          & $found version
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $binDir = Split-Path $found -Parent
          # Копируем openssl.exe
          Copy-Item $found -Destination bin\openssl.exe
          # Копируем все DLL из той же папки (libssl, libcrypto и др.)
          Get-ChildItem "$binDir\*.dll" | ForEach-Object {
            Write-Host "Копирую DLL: $($_.Name)"
            Copy-Item $_.FullName -Destination "bin\$($_.Name)"
          }
          Write-Host "Готово. Содержимое bin/:"
          Get-ChildItem bin | Select-Object Name

      - name: Build EXE
        shell: pwsh
        run: |
          # Формируем --add-binary для openssl.exe и всех DLL из bin/
          $binArgs = @()
          Get-ChildItem bin | ForEach-Object {
            $binArgs += "--add-binary"
            $binArgs += "bin\$($_.Name);bin"
          }
          $args = @(
            "--onefile",
            "--name", "checker",
            "--console",
            "--collect-all", "rich",
            "--collect-all", "certifi"
          ) + $binArgs + @("checker.py")
          Write-Host "pyinstaller $args"
          pyinstaller @args

      - name: Upload artifact (всегда)
        uses: actions/upload-artifact@v4
        with:
          name: checker-windows-exe
          path: dist/checker.exe

      # Определяем имя тега: либо из git-тега, либо из ввода workflow_dispatch
      - name: Определить версию
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Создать GitHub Release и прикрепить EXE
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          files: dist/checker.exe
          body: |
            ## VLESS+Reality Camouflage Site Checker

            ### Установка
            Скачай `checker.exe` и запусти — Python не нужен.

            ### Использование
            ```
            checker.exe                        # интерактивный режим
            checker.exe google.com github.com  # передать домены аргументами
            ```
